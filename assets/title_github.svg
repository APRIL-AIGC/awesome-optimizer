<svg width="850" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow3D" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="2" stdDeviation="0.5" flood-color="#888888" flood-opacity="0.4"/>
    </filter>
  </defs>
  <style>
    /* 字体保持 42px，增加行间距 */
    .title { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 42px; 
      font-weight: bold; 
      text-anchor: middle; 
      filter: url(#shadow3D); 
    }
    .c1 { fill: #E24A4D; } 
    .c2 { fill: #F49D26; } 
    .c3 { fill: #F8C13F; } 
    .c4 { fill: #14A76C; } 
    .c5 { fill: #55C9B3; } 
    .c6 { fill: #488DF4; } 
    .c7 { fill: #9A5CB4; } 
    .c8 { fill: #EC3E8F; }
  </style>
  
  <text x="425" y="70" class="title">
    <tspan class="c1">A Systematic </tspan>
    <tspan class="c2">Survey </tspan>
    <tspan class="c3">of </tspan>
    <tspan class="c4">Optimization </tspan>
    <tspan class="c5">Methods:</tspan>
  </text>
  
  <text x="425" y="140" class="title">
    <tspan class="c6">Algorithms, </tspan>
    <tspan class="c7">Scenarios, </tspan>
    <tspan class="c8">and Evaluations</tspan>
  </text>
</svg>